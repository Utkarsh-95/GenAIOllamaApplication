spring.application.name=genai

spring.thymeleaf.cache=false
server.port=8081

logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

#SpringAI Configs
#spring.ai.chat.client.enabled=false

spring.ai.ollama.init.pull-model-strategy=never
spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.options.model=deepseek-r1:8b
#spring.ai.ollama.chat.options.model=gemma3:1b
# for tool calling
spring.ai.ollama.chat.options.model=qwen3:4b
spring.ai.ollama.chat.options.temperature=0.7

spring.ai.vectorstore.h2.initialize-schema=true

# LLMs to Remember - The Power of Chat Memory in Spring AI with h2 Database
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.schema=classpath:/schema/schema-h2db.sql

# In-memory local database
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:chatmemory
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# RAG - configs tells Spring AI to use this data source for Vector
app.vectorstore.path=vectorstore.json

